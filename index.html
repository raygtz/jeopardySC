<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy Escolar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body { background:#f8f9fa; }
#buzz { height:120px; font-size:30px; }
</style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 text-center shadow" style="width:350px;">
  <h3>🎮 Jeopardy</h3>

  <div id="login">
    <input id="name" class="form-control mb-3" placeholder="Tu nombre">
    <button class="btn btn-primary w-100" onclick="join()">Entrar</button>
  </div>

  <div id="game" style="display:none;">
    <h5 id="status">Esperando ronda...</h5>
    <button id="buzz" class="btn btn-danger w-100" disabled onclick="enviarBuzz()">PRESIONAR</button>
  </div>
</div>

<script>
const socket = io("https://jeopardy-backend-k4ud.onrender.com");

function join(){
  const name = document.getElementById("name").value;
  if(!name) return;

  socket.emit("join", name);

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
}

function enviarBuzz(){
  socket.emit("buzz");
}

// 🚫 nombre duplicado
socket.on("nameTaken", ()=>{
  Swal.fire("Error","Nombre ya en uso","error");
});

// COUNTDOWN
socket.on("countdown", ()=>{
  let c=3;
  const s=document.getElementById("status");

  const i=setInterval(()=>{
    s.innerText=c;
    c--;
    if(c<0){
      clearInterval(i);
      s.innerText="¡YA!";
      document.getElementById("buzz").disabled=false;
    }
  },1000);
});

// GANADOR
socket.on("winner",(player)=>{
  document.getElementById("status").innerText="Ganador: "+player.name;
  document.getElementById("buzz").disabled=true;

  Swal.fire("Ganador",player.name,"success");
});

// RESET
socket.on("reset",()=>{
  document.getElementById("status").innerText="Esperando ronda...";
  document.getElementById("buzz").disabled=true;
});

// 🎉 FINAL DEL CONCURSO
socket.on("gameEnded", ()=>{
  Swal.fire({
    title: "🎉 Concurso finalizado",
    text: "Gracias por participar",
    icon: "success"
  });

  document.getElementById("game").style.display="none";
  document.getElementById("login").style.display="block";
});

// ❌ EXPULSIÓN
socket.on("kicked", ()=>{
  Swal.fire("Expulsado","El admin te sacó","warning");

  document.getElementById("game").style.display="none";
  document.getElementById("login").style.display="block";
});
</script>

</body>
</html>
