<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy Escolar</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Socket -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
  background: linear-gradient(135deg, #0d1b2a, #1b263b);
  color: white;
}
#buzz {
  height: 120px;
  font-size: 30px;
}
</style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg text-center" style="width: 350px; background:#1e293b;">

  <h3 class="mb-3">🎮 Jeopardy</h3>

  <div id="login">
    <input type="text" id="name" class="form-control mb-3" placeholder="Tu nombre">
    <button class="btn btn-primary w-100" onclick="join()">Entrar</button>
  </div>

  <div id="game" style="display:none;">
    <h5 id="status" class="mb-3">Esperando ronda...</h5>
    <button id="buzz" class="btn btn-danger w-100" disabled onclick="buzz()">PRESIONAR</button>
  </div>

</div>

<script>
const socket = io("https://TU_BACKEND_URL.onrender.com");

let myName = "";

function join(){
  myName = document.getElementById("name").value;
  if(!myName) return;

  socket.emit("join", myName, (color)=>{
    Swal.fire({
      title: "¡Listo!",
      text: "Tu color es asignado 🎨",
      icon: "success"
    });
  });

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
}

function buzz(){
  socket.emit("buzz");
}

socket.on("countdown", ()=>{
  let count = 3;
  const status = document.getElementById("status");

  const interval = setInterval(()=>{
    status.innerText = count;
    count--;

    if(count < 0){
      clearInterval(interval);
      status.innerText = "¡YA!";
      document.getElementById("buzz").disabled = false;
    }
  },1000);
});

socket.on("winner",(name)=>{
  document.getElementById("status").innerText="Ganador: "+name;
  document.getElementById("buzz").disabled=true;

  Swal.fire("Ganador", name, "success");
});

socket.on("reset",()=>{
  document.getElementById("status").innerText="Esperando ronda...";
  document.getElementById("buzz").disabled=true;
});
</script>

</body>
</html>
