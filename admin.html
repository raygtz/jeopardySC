<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Jeopardy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body { background:#f8f9fa; }
</style>
</head>

<body class="container py-4">

<h1 class="text-center mb-4">👨‍🏫 Panel Admin</h1>

<div id="loginBox" class="card p-4 text-center mx-auto" style="max-width:400px;">
  <input type="password" id="adminPass" class="form-control mb-3" placeholder="Contraseña">
  <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
</div>

<div id="adminPanel" style="display:none;">

  <div class="text-end mb-3">
    <button class="btn btn-danger" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="text-center mb-4">
    <button class="btn btn-success me-2" onclick="startRound()">▶ Iniciar</button>
    <button class="btn btn-danger me-2" onclick="kickAll()">⛔ Desconectar jugadores</button>
    <button class="btn btn-secondary" onclick="resetPoints()">♻ Puntos</button>
  </div>

  <div class="card p-3 mb-3 text-center">
    <h3 id="winner">Sin ganador</h3>
  </div>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Puntos</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="players"></tbody>
  </table>

</div>

<script>
const socket = io("https://jeopardy-backend-k4ud.onrender.com");

socket.on("connect", ()=>{
  if(localStorage.getItem("admin")){
    loginSuccess();
    socket.emit("adminLogin","admin123",()=>{});
  }
});

function login(){
  const pass=adminPass.value;

  socket.emit("adminLogin",pass,(ok)=>{
    if(!ok) return Swal.fire("Error","Incorrecta","error");

    localStorage.setItem("admin","true");
    loginSuccess();
  });
}

function loginSuccess(){
  loginBox.style.display="none";
  adminPanel.style.display="block";
}

function logout(){
  localStorage.removeItem("admin");
  location.reload();
}

function startRound(){ socket.emit("startRound"); }
function resetPoints(){ socket.emit("resetPoints"); }

// 🔥 FINALIZAR CONCURSO
function kickAll(){
  Swal.fire({
    title: "¿Finalizar concurso?",
    text: "Se desconectarán todos los jugadores",
    icon: "warning",
    showCancelButton: true,
    confirmButtonText: "Sí, terminar"
  }).then((res)=>{
    if(res.isConfirmed){
      socket.emit("kickAll");
    }
  });
}

function removePlayer(id){
  socket.emit("removePlayer",id);
}

socket.on("winner",(p)=>{
  winner.innerText="Ganador: "+p.name;
  socket.emit("addPoint",p.id);
});

socket.on("updatePlayers",(players)=>{
  const t=document.getElementById("players");
  t.innerHTML="";

  for(let id in players){
    t.innerHTML+=`
      <tr>
        <td>
          <span style="width:10px;height:10px;background:${players[id].color};display:inline-block;border-radius:50%;margin-right:5px;"></span>
          ${players[id].name}
        </td>
        <td>${players[id].points}</td>
        <td><button class="btn btn-sm btn-danger" onclick="removePlayer('${id}')">❌</button></td>
      </tr>
    `;
  }
});
</script>

</body>
</html>
