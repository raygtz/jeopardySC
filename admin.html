<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Jeopardy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
  background: #0f172a;
  color: white;
}
.card {
  background: #1e293b;
}
</style>
</head>

<body class="container py-4">

<h1 class="text-center mb-4">👨‍🏫 Panel Admin</h1>

<div class="text-center mb-4">
  <button class="btn btn-success me-2" onclick="startRound()">▶ Iniciar Ronda</button>
  <button class="btn btn-warning" onclick="resetRound()">🔄 Reset</button>
</div>

<div class="card p-3 mb-4 text-center">
  <h3 id="winner">Sin ganador</h3>
</div>

<div class="card p-3">
  <h4>Jugadores</h4>
  <table class="table table-dark table-striped mt-3">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Puntos</th>
      </tr>
    </thead>
    <tbody id="players"></tbody>
  </table>
</div>

<script>
const socket = io("https://jeopardy-backend-k4ud.onrender.com");

// ✅ Esperar conexión
socket.on("connect", () => {
  console.log("Conectado al servidor");

  socket.emit("adminLogin", "admin123", (ok)=>{
    if(!ok){
      Swal.fire("Error", "No autorizado", "error");
    } else {
      console.log("Admin autorizado");
    }
  });
});

// DEBUG (muy útil)
socket.on("connect_error", (err) => {
  console.log("Error conexión:", err.message);
});

function startRound(){
  socket.emit("startRound");
}

function resetRound(){
  socket.emit("resetRound");
}

socket.on("winner",(name)=>{
  document.getElementById("winner").innerText="Ganador: "+name;

  Swal.fire({
    title: "Ganador",
    text: name,
    icon: "success"
  });

  socket.emit("addPoint", name);
});

socket.on("updatePlayers",(players)=>{
  const table = document.getElementById("players");
  table.innerHTML="";

  for(let id in players){
    table.innerHTML+=`
      <tr>
        <td>${players[id].name}</td>
        <td>${players[id].points}</td>
      </tr>
    `;
  }
});
</script>

</body>
</html>
