<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Jeopardy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
  background: #f8f9fa;
}
</style>
</head>

<body class="container py-4">

<h1 class="text-center mb-4">👨‍🏫 Panel Admin</h1>

<!-- LOGIN -->
<div id="loginBox" class="card p-4 text-center mx-auto" style="max-width:400px;">
  <h4>Acceso Administrador</h4>
  <input type="password" id="adminPass" class="form-control my-3" placeholder="Contraseña">
  <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none;">

  <div class="text-end mb-3">
    <button class="btn btn-danger" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="text-center mb-4">
    <button class="btn btn-success me-2" onclick="startRound()">▶ Iniciar Ronda</button>
    <button class="btn btn-warning me-2" onclick="resetRound()">🔄 Reset</button>
    <button class="btn btn-secondary" onclick="resetPoints()">♻ Reset Puntos</button>
  </div>

  <div class="card p-3 mb-4 text-center">
    <h3 id="winner">Sin ganador</h3>
  </div>

  <div class="card p-3">
    <h4>Jugadores conectados</h4>
    <table class="table table-bordered mt-3">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Puntos</th>
        </tr>
      </thead>
      <tbody id="players"></tbody>
    </table>
  </div>

</div>

<script>
const socket = io("https://jeopardy-backend-k4ud.onrender.com");

// 🔐 AUTO LOGIN
if(localStorage.getItem("admin") === "true"){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("adminPanel").style.display="block";

  socket.emit("adminLogin", "admin123", ()=>{});
}

// LOGIN
function login(){
  const pass = document.getElementById("adminPass").value;

  socket.emit("adminLogin", pass, (ok)=>{
    if(!ok){
      Swal.fire("Error", "Contraseña incorrecta", "error");
    } else {
      localStorage.setItem("admin", "true");

      document.getElementById("loginBox").style.display="none";
      document.getElementById("adminPanel").style.display="block";
    }
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem("admin");
  location.reload();
}

// FUNCIONES ADMIN
function startRound(){
  socket.emit("startRound");
}

function resetRound(){
  socket.emit("resetRound");
}

function resetPoints(){
  Swal.fire({
    title: "¿Resetear puntos?",
    showCancelButton: true
  }).then((res)=>{
    if(res.isConfirmed){
      socket.emit("resetPoints");
    }
  });
}

// EVENTOS
socket.on("winner",(name)=>{
  document.getElementById("winner").innerText="Ganador: " + name;
  Swal.fire("Ganador", name, "success");
  socket.emit("addPoint", name);
});

socket.on("updatePlayers",(players)=>{
  const table = document.getElementById("players");
  table.innerHTML="";

  for(let id in players){
    table.innerHTML+=`
      <tr>
        <td>${players[id].name}</td>
        <td>${players[id].points}</td>
      </tr>
    `;
  }
});
</script>

</body>
</html>
